<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ball Trap">
<title>Ball Trap Farges</title>
<style>
:root{
  --bg:#0f172a;--bg2:#1e293b;--card:#1e293b;--card2:#263548;
  --marine:#1a3a6b;--marine2:#2a5298;
  --or:#C9960C;--or2:#F0B429;--or-pale:rgba(201,150,12,.15);
  --gr:#1A7A4A;--gr2:#4ade80;--rd:#C0392B;--yl:#C9960C;
  --tx:#f1f5f9;--tx2:#94a3b8;--mu:#64748b;--bd:#1f2937;
  --shadow:0 2px 16px rgba(0,0,0,.4);--r:14px;--r-sm:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif;min-height:100vh;font-size:16px;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
input,button,select{font-family:inherit}
#auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#0a1628,#0f2040,#1a3a6b)}
.auth-club-name{color:#fff;font-size:1.1rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;margin-top:14px;text-align:center}
.auth-club-name span{color:var(--or2);display:block;font-size:.72rem;letter-spacing:.22em;margin-top:3px}
.auth-box{background:#1e293b;border:1px solid #2d3f55;border-radius:20px;padding:26px 22px;width:100%;max-width:380px;margin-top:20px}
.auth-tabs{display:flex;background:#0f172a;border-radius:10px;padding:3px;margin-bottom:22px}
.auth-tab{flex:1;padding:10px;background:none;border:none;border-radius:8px;color:var(--mu);font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s}
.auth-tab.on{background:#263548;color:var(--tx)}
.af{margin-bottom:14px}
.af label{font-size:.72rem;color:var(--tx2);font-weight:600;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:6px}
.af input{background:#0f172a;border:1.5px solid var(--bd);border-radius:10px;color:var(--tx);padding:13px 15px;font-size:.95rem;width:100%;outline:none;transition:all .2s}
.af input:focus{border-color:var(--or)}
.abtn{background:var(--or);color:#fff;border:none;border-radius:12px;padding:15px;font-size:1rem;font-weight:700;cursor:pointer;width:100%;margin-bottom:8px;transition:opacity .2s}
.abtn:active{opacity:.85}.abtn:disabled{opacity:.5}
.alink{background:none;border:none;color:var(--mu);font-size:.85rem;cursor:pointer;display:block;margin:12px auto 0;text-align:center}
.aerr{color:#f87171;font-size:.78rem;margin-top:6px;text-align:center;min-height:18px}
#app{display:none;min-height:100vh;padding-bottom:84px}
.topbar{background:#111827;padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;border-bottom:1px solid var(--bd)}
.avatar-btn{width:40px;height:40px;border-radius:50%;background:var(--marine);display:flex;align-items:center;justify-content:center;border:2px solid var(--or);cursor:pointer;flex-shrink:0;position:relative}
.avatar-btn span{color:var(--or);font-size:13px;font-weight:800}
.badge-notif{position:absolute;top:-3px;right:-3px;width:14px;height:14px;background:#ef4444;border-radius:50%;border:2px solid #111827;display:none;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:800}
.badge-notif.on{display:flex}
.logo-center{text-align:center;flex:1}
.logo-center .ln{color:#fff;font-size:14px;font-weight:800;letter-spacing:.1em;text-transform:uppercase}
.logo-center .ls{color:var(--or2);font-size:9px;letter-spacing:.2em;margin-top:1px}
.nav{display:flex;background:#111827;border-top:1px solid var(--bd);position:fixed;bottom:0;left:0;right:0;z-index:50;padding:6px 0 calc(6px + env(safe-area-inset-bottom));align-items:flex-end}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;background:none;border:none;padding:4px 0}
.nb .ic{font-size:20px;line-height:1}
.nb .nl{color:var(--mu);font-size:8px;text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.nb.on .nl{color:var(--or)}
.nb-center-wrap{flex:1;display:flex;flex-direction:column;align-items:center;padding-bottom:4px}
.nb-plus{width:54px;height:54px;border-radius:50%;background:var(--or);display:flex;align-items:center;justify-content:center;border:4px solid #111827;margin-bottom:4px;cursor:pointer;box-shadow:0 4px 20px rgba(201,150,12,.5)}
.nb-plus:active{transform:scale(.93)}
.nb-plus-icon{color:#fff;font-size:28px;font-weight:300;line-height:1;margin-top:-2px}
.nb-center-wrap .nl{color:var(--or);font-size:8px;text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.page{display:none;padding:16px}
.page.on{display:block}
.section-title{font-size:.72rem;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.1em;margin:16px 0 10px}
.card{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:12px}
.inp{background:#0f172a;border:1.5px solid var(--bd);border-radius:10px;color:var(--tx);padding:13px 15px;font-size:.95rem;width:100%;outline:none;transition:border .2s}
.inp:focus{border-color:var(--or)}
.lbl{font-size:.72rem;color:var(--tx2);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:block}
.fld{margin-bottom:14px}
.btn{background:var(--or);color:#fff;border:none;border-radius:12px;padding:15px 20px;font-size:1rem;font-weight:700;cursor:pointer;width:100%;transition:opacity .2s}
.btn:active{opacity:.85}.btn:disabled{opacity:.5}
.btn-o{background:transparent;color:var(--tx);border:1.5px solid var(--bd);border-radius:12px;padding:13px 18px;font-size:.95rem;font-weight:600;cursor:pointer;width:100%;transition:all .2s;margin-top:10px}
.btn-o:active{border-color:var(--or);color:var(--or)}
.btn-r{background:transparent;color:#f87171;border:1.5px solid #f87171;border-radius:10px;padding:8px 14px;font-size:.85rem;font-weight:600;cursor:pointer}
.btn-gr{background:transparent;color:#4ade80;border:1.5px solid #4ade80;border-radius:10px;padding:8px 14px;font-size:.85rem;font-weight:600;cursor:pointer}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:flex-end;justify-content:center}
.mo.on{display:flex}
.mbox{background:#1e293b;border-radius:24px 24px 0 0;padding:20px 18px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto}
.mhandle{width:36px;height:4px;background:var(--mu);border-radius:2px;margin:0 auto 18px;opacity:.5}
.mtitle{font-size:1.1rem;font-weight:800;color:var(--tx);margin-bottom:16px}
.lsbox{background:var(--marine);border-radius:var(--r);padding:16px;margin-bottom:16px;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:8px}
.lsi{text-align:center}
.lsv{font-size:2rem;font-weight:800;color:#fff;line-height:1}
.lsv.or{color:var(--or2)}.lsv.gr{color:#4ade80}.lsv.yl{color:#fbbf24}
.lsl{font-size:.6rem;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.07em;margin-top:3px}
.stblock{background:var(--card);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.sthd{background:var(--marine);padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
.stn{font-size:.82rem;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.1em}
.sts{font-size:.7rem;color:rgba(255,255,255,.6)}
.stbd{padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.shr{display:flex;align-items:center;gap:10px}
.shl{font-size:.78rem;color:var(--tx2);font-weight:500;width:68px;flex-shrink:0}
.sbts{display:flex;gap:6px}
.sbt{height:44px;border-radius:10px;border:1.5px solid var(--bd);background:#0f172a;color:var(--mu);font-size:.75rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.sbt:active{transform:scale(.92)}
.sbt.c1{background:rgba(26,122,74,.2);border-color:#4ade80;color:#4ade80}
.sbt.c2{background:var(--or-pale);border-color:var(--or);color:var(--or2)}
.sbt.miss{background:rgba(192,57,43,.2);border-color:#f87171;color:#f87171}
.sbt-c1{width:50px}.sbt-c2{width:50px}.sbt-x{width:44px}
.dbt{width:50px;height:44px;border-radius:10px;border:1.5px solid var(--bd);background:#0f172a;color:var(--mu);font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-weight:700}
.dbt:active{transform:scale(.92)}
.dbt.hit{background:rgba(26,122,74,.2);border-color:#4ade80;color:#4ade80}
.dbt.miss{background:rgba(192,57,43,.2);border-color:#f87171;color:#f87171}
.hc{background:var(--card);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:background .15s}
.hc:active{background:var(--card2)}
.htag{background:var(--bg2);border-radius:20px;padding:4px 11px;font-size:.72rem;color:var(--tx2);font-weight:500}
.sr{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--bd)}
.sr:last-child{border-bottom:none}
.sr-lbl{font-size:.88rem;color:var(--tx2)}
.sr-val{font-size:.95rem;font-weight:700;color:var(--tx)}
.ri{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--card);border-radius:var(--r);margin-bottom:10px}
.trow{display:flex;background:#0f172a;border-radius:10px;margin-bottom:14px;padding:3px}
.tgl{flex:1;padding:9px;background:none;border:none;border-radius:8px;color:var(--mu);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s}
.tgl.on{background:var(--card2);color:var(--tx)}
.frow{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.ftag{background:var(--card);border-radius:20px;padding:7px 16px;font-size:.78rem;color:var(--tx2);cursor:pointer;white-space:nowrap;flex-shrink:0;font-weight:500;transition:all .2s}
.ftag.on{background:var(--or);color:#fff;font-weight:700}
.vopts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.vopt{background:#0f172a;border:1.5px solid var(--bd);border-radius:12px;padding:14px 8px;text-align:center;cursor:pointer;transition:all .2s}
.vopt.on{border-color:var(--or);background:var(--or-pale)}
.vopt .vi{font-size:1.5rem;margin-bottom:5px}
.vopt .vl{font-size:.7rem;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.vopt.on .vl{color:var(--or)}
.dpst{background:#0f172a;border-radius:var(--r-sm);padding:12px;margin-bottom:10px}
.dpst h4{font-size:.78rem;color:var(--or);font-weight:700;text-transform:uppercase;margin-bottom:8px}
.dsh{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd);font-size:.85rem}
.dsh:last-child{border-bottom:none}
.aui{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bd)}
.aui:last-child{border-bottom:none}
.achk{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--bd);background:#0f172a;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.achk.on{background:var(--or);border-color:var(--or);color:#fff}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.astat{background:var(--card);border-radius:var(--r);padding:16px;text-align:center}
.astat .av2{font-size:2rem;font-weight:800;color:#a855f7}
.astat .al{font-size:.68rem;color:var(--mu);text-transform:uppercase;font-weight:600;margin-top:3px}
.arow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--bd);gap:8px}
.arow:last-child{border-bottom:none}
.chwrap{width:100%;height:120px;margin-top:8px}
/* AMIS */
.ami-card{background:var(--card);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.ami-status{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 10px;border-radius:20px}
.ami-status.accepte{background:rgba(74,222,128,.15);color:#4ade80}
.ami-status.en_attente{background:rgba(251,191,36,.15);color:#fbbf24}
/* CODE SOCIAL */
.code-badge{background:var(--or-pale);border:1.5px solid var(--or);border-radius:10px;padding:10px 16px;text-align:center;margin-bottom:14px}
.code-badge .cb-label{font-size:.68rem;color:var(--mu);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.code-badge .cb-code{font-size:1.4rem;font-weight:800;color:var(--or2);letter-spacing:.15em}
/* PATTERNS */
.pattern-card{background:var(--card);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;border-left:3px solid}
.pattern-card.danger{border-left-color:#f87171}
.pattern-card.warning{border-left-color:#fbbf24}
.pattern-card.success{border-left-color:#4ade80}
.pattern-card .pc-icon{font-size:1.4rem;margin-bottom:6px}
.pattern-card .pc-title{font-size:.9rem;font-weight:700;margin-bottom:4px}
.pattern-card .pc-desc{font-size:.78rem;color:var(--tx2);line-height:1.4}
/* STATS ENRICHIES */
.stat-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-box{background:var(--card);border-radius:var(--r-sm);padding:12px;text-align:center}
.stat-box .sv{font-size:1.4rem;font-weight:800}
.stat-box .sl{font-size:.68rem;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.prog-bar-bg{background:#0f172a;border-radius:20px;height:8px;overflow:hidden;margin-top:6px}
.prog-bar{height:8px;border-radius:20px;transition:width .4s}
.empty{text-align:center;padding:48px 20px;color:var(--mu)}
.empty .ei{font-size:3rem;margin-bottom:12px}
.loader{display:inline-block;width:18px;height:18px;border:2px solid var(--bd);border-top-color:var(--or);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#263548;color:var(--tx);border:1px solid var(--bd);padding:11px 22px;border-radius:30px;font-size:.85rem;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.on{opacity:1}
.profil-panel{position:fixed;inset:0;z-index:200;display:flex;pointer-events:none}
.profil-panel.on{pointer-events:all}
.profil-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);opacity:0;transition:opacity .25s}
.profil-panel.on .profil-overlay{opacity:1}
.profil-drawer{position:absolute;top:0;left:0;bottom:0;width:82%;max-width:320px;background:#1e293b;transform:translateX(-100%);transition:transform .25s;overflow-y:auto;padding:60px 20px 40px}
.profil-panel.on .profil-drawer{transform:translateX(0)}
.profil-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--mu);font-size:1.3rem;cursor:pointer}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex-shrink:0}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div style="pointer-events:none;text-align:center">
    <svg width="86" height="86" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg" style="border-radius:50%;box-shadow:0 0 0 3px #C9960C,0 0 24px rgba(201,150,12,.35)">
      <circle cx="45" cy="45" r="45" fill="#C9960C"/>
      <circle cx="45" cy="45" r="36" fill="#7a8fa8"/>
      <line x1="18" y1="18" x2="72" y2="72" stroke="#1a3a6b" stroke-width="9" stroke-linecap="round"/>
      <line x1="72" y1="18" x2="18" y2="72" stroke="#1a3a6b" stroke-width="9" stroke-linecap="round"/>
      <text x="45" y="34" fill="#1a3a6b" font-size="11" font-weight="800" text-anchor="middle" font-family="serif">T</text>
      <text x="24" y="52" fill="#1a3a6b" font-size="11" font-weight="800" text-anchor="middle" font-family="serif">B</text>
      <text x="66" y="52" fill="#1a3a6b" font-size="11" font-weight="800" text-anchor="middle" font-family="serif">C</text>
      <text x="45" y="66" fill="#1a3a6b" font-size="9" font-weight="700" text-anchor="middle" font-family="serif">Farges</text>
    </svg>
    <div class="auth-club-name">Ball Trap Club<span>Farges</span></div>
  </div>
  <div class="auth-box">
    <div class="auth-tabs">
      <button class="auth-tab on" id="atb-login">Connexion</button>
      <button class="auth-tab" id="atb-register">Inscription</button>
    </div>
    <div id="pnl-login">
      <div class="af"><label>Email</label><input id="l-email" type="email" placeholder="ton@email.com" autocomplete="email"></div>
      <div class="af"><label>Mot de passe</label><input id="l-pwd" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="abtn" id="l-btn">Se connecter</button>
      <div class="aerr" id="l-err"></div>
      <button class="alink" id="l-forgot">Mot de passe oublié ?</button>
    </div>
    <div id="pnl-register" style="display:none">
      <div class="af"><label>Prénom / Pseudo</label><input id="r-nom" placeholder="Ex: Jean"></div>
      <div class="af"><label>Email</label><input id="r-email" type="email" placeholder="ton@email.com"></div>
      <div class="af"><label>Mot de passe</label><input id="r-pwd" type="password" placeholder="Min. 6 caractères"></div>
      <button class="abtn" id="r-btn">Créer mon compte</button>
      <div class="aerr" id="r-err"></div>
    </div>
    <div id="pnl-forgot" style="display:none">
      <p style="font-size:.88rem;color:var(--tx2);margin-bottom:16px;line-height:1.5">Saisis ton email pour recevoir un lien de réinitialisation.</p>
      <div class="af"><label>Email</label><input id="f-email" type="email" placeholder="ton@email.com"></div>
      <button class="abtn" id="f-btn">Envoyer le lien</button>
      <div class="aerr" id="f-msg"></div>
      <button class="alink" id="f-back">← Retour</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <button class="avatar-btn" id="btn-open-profil">
      <span id="topbar-initials">?</span>
      <div class="badge-notif" id="badge-notif"></div>
    </button>
    <div class="logo-center"><div class="ln">Ball Trap</div><div class="ls">Club de Farges</div></div>
    <div id="topbar-right" style="width:40px;display:flex;justify-content:flex-end"></div>
  </div>

  <div class="page on" id="page-home"><div id="home-content"></div></div>
  <div class="page" id="page-stats"><div id="stats-content"></div></div>
  <div class="page" id="page-partie"><div id="partie-root"></div></div>
  <div class="page" id="page-amis"><div id="amis-content"></div></div>
  <div class="page" id="page-classement"></div>
  <div class="page" id="page-admin">
    <div class="section-title" style="margin-top:4px;color:#a855f7">⚙ Administration</div>
    <div class="agrid" id="admin-kpis"></div>
    <div class="card"><div class="lbl">Activité — 30 jours</div><div class="chwrap" id="admin-chart"></div></div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span class="lbl" style="margin:0">Utilisateurs</span>
        <input class="inp" id="adm-search" placeholder="🔍" style="width:130px;padding:9px 12px;font-size:.85rem">
      </div>
      <div id="adm-users"></div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span class="lbl" style="margin:0">Toutes les parties</span>
        <select class="inp" id="adm-filter-user" style="width:140px;padding:9px 12px;font-size:.85rem"><option value="">Tous</option></select>
      </div>
      <div id="adm-parties"></div>
    </div>
  </div>

  <nav class="nav" id="main-nav">
    <button class="nb on" data-page="home"><span class="ic">🏠</span><span class="nl">Accueil</span></button>
    <button class="nb" data-page="stats"><span class="ic">📊</span><span class="nl">Stats</span></button>
    <div class="nb-center-wrap" id="btn-nouvelle-partie" style="cursor:pointer">
      <div class="nb-plus"><span class="nb-plus-icon">+</span></div>
      <span class="nl">Partie</span>
    </div>
    <button class="nb" data-page="amis"><span class="ic">👥</span><span class="nl">Amis</span></button>
    <button class="nb" data-page="classement"><span class="ic">🏆</span><span class="nl">Classement</span></button>
  </nav>
